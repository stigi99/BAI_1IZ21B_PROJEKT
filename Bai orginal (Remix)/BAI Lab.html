<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BAI Security Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        sakura: { 50:"#fff1fb",100:"#ffd9f3",200:"#ffb7e7",500:"#ec4899",700:"#be185d",900:"#831843"},
        neon:   { 50:"#ecfeff",100:"#cffafe",200:"#a5f3fc",500:"#06b6d4",700:"#0e7490",900:"#164e63"},
        clay:   { 50:"#faf7f2",100:"#efe7da",200:"#dfd1bc",800:"#4e4032",900:"#2f261e"}
      },
      fontFamily: {
        sans: ['"M PLUS Rounded 1c"','Manrope','system-ui','sans-serif'],
        mono: ['"JetBrains Mono"','ui-monospace','monospace']
      }
    }
  }
}
</script>
<style>
  body{
    background:
      radial-gradient(circle at 12% 18%, rgba(236,72,153,.22), transparent 28%),
      radial-gradient(circle at 88% 12%, rgba(6,182,212,.22), transparent 24%),
      radial-gradient(circle at 50% 90%, rgba(168,85,247,.18), transparent 28%),
      linear-gradient(180deg,#fff7fb 0%,#f5fbff 46%,#fdf2f8 100%);
    background-attachment: fixed;
  }
  .anime-mascot{position:fixed;left:0;top:0;z-index:50;pointer-events:none;will-change:left,top}
  .anime-mascot-card{display:flex;height:64px;width:64px;align-items:center;justify-content:center;overflow:hidden;border-radius:9999px;border:1px solid #fbcfe8;background:rgba(255,255,255,.9);box-shadow:0 6px 18px rgba(244,114,182,.35);backdrop-filter:blur(8px)}
  .anime-mascot-gif{display:block;height:100%;width:100%;user-select:none;object-fit:cover}
  .anime-mascot-sway{animation:mascot-float 3.2s ease-in-out infinite}
  @keyframes mascot-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .htmx-indicator{display:none}
  .line-clamp-3{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .terminal{font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.55;background:#0b0b14;color:#cbd5e1;border-radius:14px;padding:14px 16px;overflow-x:auto;white-space:pre-wrap;word-break:break-word}
  .terminal .ok{color:#86efac}.terminal .err{color:#fca5a5}.terminal .warn{color:#fde68a}.terminal .info{color:#93c5fd}.terminal .dim{color:#64748b}
  details > summary{list-style:none;cursor:pointer}
  details > summary::-webkit-details-marker{display:none}
  .scroll-shadow{mask-image:linear-gradient(180deg,#000 92%,transparent)}
  /* Page transition */
  .page-enter{animation:pageIn .35s ease}
  @keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  /* Sparkle bg for hero */
  .sparkle::before{content:"✨";position:absolute;font-size:18px;opacity:.6}

  /* ----- Sakura petals ----- */
  #sakura-canvas{position:fixed;inset:0;z-index:1;pointer-events:none}
  .petal{position:absolute;top:-30px;width:14px;height:14px;background:radial-gradient(ellipse at 30% 30%, #ffd9f3 0%, #f9a8d4 60%, #ec4899 100%);border-radius:150% 0 150% 0;opacity:.85;will-change:transform;filter:drop-shadow(0 1px 2px rgba(236,72,153,.25))}
  @keyframes petalFall{0%{transform:translate3d(0,-30px,0) rotate(0)}100%{transform:translate3d(var(--drift,40px),100vh,0) rotate(720deg)}}

  /* ----- Mascot mode auras + speech bubble ----- */
  .anime-mascot-card{position:relative;transition:box-shadow .4s, border-color .4s, background .4s}
  body.sec-vuln .anime-mascot-card{border-color:#fca5a5;box-shadow:0 0 0 3px rgba(248,113,113,.25), 0 0 24px rgba(244,63,94,.55), 0 6px 18px rgba(244,63,94,.4)}
  body.sec-secure .anime-mascot-card{border-color:#7dd3fc;box-shadow:0 0 0 3px rgba(125,211,252,.3), 0 0 24px rgba(56,189,248,.55), 0 6px 18px rgba(56,189,248,.35)}
  body.sec-vuln .anime-mascot-card::after{content:"";position:absolute;inset:-6px;border-radius:9999px;background:radial-gradient(circle, rgba(248,113,113,.45), transparent 70%);animation:auraPulse 1.6s ease-in-out infinite;z-index:-1}
  body.sec-secure .anime-mascot-card::after{content:"";position:absolute;inset:-6px;border-radius:9999px;background:radial-gradient(circle, rgba(56,189,248,.45), transparent 70%);animation:auraPulse 1.6s ease-in-out infinite;z-index:-1}
  @keyframes auraPulse{0%,100%{transform:scale(1);opacity:.55}50%{transform:scale(1.18);opacity:.85}}
  body.sec-vuln .anime-mascot-card::before{content:"";position:absolute;left:18px;top:24px;width:6px;height:6px;border-radius:9999px;background:#dc2626;box-shadow:18px 0 0 #dc2626, 0 0 8px #f87171, 18px 0 8px #f87171;animation:eyeBlink 3.2s infinite;z-index:2}
  @keyframes eyeBlink{0%,92%,100%{opacity:1}94%,98%{opacity:0}}

  .speech-bubble{position:fixed;z-index:51;max-width:220px;padding:10px 14px;background:#fff;border:2px solid #fbcfe8;border-radius:18px;font-size:12px;line-height:1.4;font-weight:600;color:#831843;box-shadow:0 8px 24px rgba(236,72,153,.25);pointer-events:none;animation:bubblePop .25s ease-out, bubbleOut .3s ease-in 4.7s forwards}
  .speech-bubble::after{content:"";position:absolute;bottom:-8px;right:24px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #fbcfe8}
  body.sec-secure .speech-bubble{border-color:#7dd3fc;color:#0c4a6e}
  body.sec-secure .speech-bubble::after{border-top-color:#7dd3fc}
  @keyframes bubblePop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes bubbleOut{to{opacity:0;transform:translateY(-6px) scale(.95)}}

  /* ----- Skeleton shimmer ----- */
  .skeleton{position:relative;overflow:hidden;background:linear-gradient(90deg,#fdf2f8 0%,#fce7f3 50%,#fdf2f8 100%);background-size:200% 100%;animation:shimmer 1.4s infinite linear;border-radius:8px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* ----- HUD floating panels ----- */
  .hud{position:fixed;bottom:20px;z-index:80;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border:1px solid #fbcfe8;border-radius:18px;box-shadow:0 20px 60px rgba(236,72,153,.22);font-family:'M PLUS Rounded 1c',sans-serif}
  .hud-collapsed{width:auto}
  .hud-tab{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;font-weight:700;font-size:12px;color:#831843;user-select:none}
  .hud-tab .dot{width:8px;height:8px;border-radius:9999px;background:#86efac;animation:hudDot 1.6s infinite}
  @keyframes hudDot{0%,100%{opacity:.5}50%{opacity:1}}
  .hud-body{max-height:60vh;overflow-y:auto;padding:0 12px 12px;font-size:12px}
  .hud-row{padding:8px;border-radius:10px;margin-bottom:6px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.45;border:1px solid transparent;cursor:pointer}
  .hud-row:hover{background:#fdf2f8}
  .hud-row.method-GET{border-left:3px solid #06b6d4}
  .hud-row.method-POST{border-left:3px solid #ec4899}
  .hud-row.method-PUT{border-left:3px solid #f59e0b}
  .hud-row.method-DELETE{border-left:3px solid #dc2626}
  .pill{display:inline-block;padding:1px 8px;border-radius:9999px;font-size:10px;font-weight:800;letter-spacing:.04em}
  .pill-200{background:#dcfce7;color:#166534}
  .pill-403{background:#fee2e2;color:#991b1b}
  .pill-blocked{background:#dbeafe;color:#1e40af}
  .pill-pwn{background:#fef3c7;color:#92400e}

  /* Cheatsheet drawer */
  #cheat-drawer{position:fixed;top:0;right:-440px;width:420px;height:100vh;background:rgba(255,255,255,.98);backdrop-filter:blur(12px);border-left:1px solid #fbcfe8;box-shadow:-20px 0 60px rgba(236,72,153,.18);z-index:85;transition:right .3s ease;overflow-y:auto;font-family:'M PLUS Rounded 1c',sans-serif}
  #cheat-drawer.open{right:0}
  .cheat-tab{position:fixed;right:0;top:160px;z-index:84;writing-mode:vertical-rl;background:linear-gradient(180deg,#ec4899,#06b6d4);color:#fff;font-weight:800;padding:10px 6px;border-radius:8px 0 0 8px;cursor:pointer;font-size:12px;letter-spacing:.08em;box-shadow:-4px 0 12px rgba(236,72,153,.25);user-select:none}
  .copy-btn{font-family:'JetBrains Mono',monospace;font-size:11px;background:#0b0b14;color:#cbd5e1;padding:8px 10px;border-radius:8px;width:100%;text-align:left;cursor:pointer;border:1px solid #1f2937;transition:border-color .2s,background .2s}
  .copy-btn:hover{border-color:#ec4899;background:#11111a}
  .copy-btn.copied{border-color:#10b981;background:#052e1f}
  .copy-btn.copied::after{content:" ✓ copied";color:#86efac}
</style>
</head>
<body class="min-h-screen flex flex-col text-slate-900 antialiased font-sans sec-vuln">

<div id="sakura-canvas" aria-hidden="true"></div>

<!-- ===== Header ===== -->
<header class="sticky top-0 z-40 border-b border-fuchsia-200/70 bg-white/75 shadow-[0_10px_30px_rgba(236,72,153,0.12)] backdrop-blur-xl">
  <nav class="mx-auto max-w-6xl px-4 py-3 sm:px-8">
    <div class="flex flex-wrap items-center justify-between gap-4">
      <a href="#/posts" class="inline-flex items-center gap-3 rounded-full bg-gradient-to-r from-fuchsia-500 via-pink-500 to-sky-500 px-4 py-2 text-sm font-extrabold tracking-wide text-white shadow-lg shadow-pink-200 transition hover:-translate-y-0.5 hover:shadow-pink-300">
        <span class="text-2xl">🌸</span><span>BAI Lab</span>
      </a>
      <div id="navlinks" class="flex flex-wrap items-center gap-2 sm:gap-3"></div>
    </div>
  </nav>
</header>

<main id="main" class="flex-1 mx-auto w-full max-w-6xl px-4 py-8 sm:px-8"></main>

<footer class="mt-12 border-t border-fuchsia-200/70 bg-white/80 backdrop-blur-xl">
  <div class="mx-auto max-w-6xl px-4 py-6 text-center text-xs font-medium text-slate-500 sm:px-8">
    <p>BAI Security Lab © 2026 • Powered by Go, Templ, HTMX & Tailwind CSS</p>
  </div>
</footer>

<!-- Mascot -->
<div id="anime-mascot" class="anime-mascot hidden md:block" aria-hidden="true">
  <div class="anime-mascot-card"><div class="anime-mascot-sway">
    <img class="anime-mascot-gif" src="anime-girl.gif" alt="" width="56" height="56" draggable="false">
  </div></div>
</div>

<!-- HUD: Request Inspector + Attack Timeline -->
<div id="hud-requests" class="hud" style="left:20px;width:380px">
  <div class="hud-tab" onclick="toggleHud('hud-requests')">
    <span class="dot"></span><span>🔍 Request Inspector</span><span style="margin-left:auto;color:#9ca3af" id="reqs-count">0</span>
  </div>
  <div class="hud-body" id="reqs-body" style="display:none">
    <div id="reqs-list"></div>
    <div id="reqs-detail" class="terminal" style="display:none;font-size:10.5px;margin-top:6px"></div>
  </div>
</div>

<div id="hud-timeline" class="hud" style="right:20px;width:340px">
  <div class="hud-tab" onclick="toggleHud('hud-timeline')">
    <span class="dot" style="background:#f87171"></span><span>📜 Attack Timeline</span><span style="margin-left:auto;color:#9ca3af" id="atk-count">0</span>
    <button onclick="event.stopPropagation();exportPoC()" title="Export PoC report" style="background:#fce7f3;border:none;border-radius:6px;padding:2px 6px;margin-left:6px;font-size:10px;color:#831843;cursor:pointer">⬇ md</button>
  </div>
  <div class="hud-body" id="atk-body" style="display:none">
    <div id="atk-list"></div>
  </div>
</div>

<!-- Cheatsheet drawer -->
<div id="cheat-tab-handle" class="cheat-tab" onclick="toggleCheat()">⚔️ PAYLOADS</div>
<div id="cheat-drawer">
  <div class="px-5 py-4 border-b border-fuchsia-100 flex items-center justify-between sticky top-0 bg-white/95 backdrop-blur z-10">
    <div>
      <h2 class="text-lg font-extrabold">⚔️ Payload Cheat-Sheet</h2>
      <p class="text-xs text-slate-500">Click any to copy</p>
    </div>
    <button onclick="toggleCheat()" class="h-8 w-8 rounded-full bg-fuchsia-50 hover:bg-fuchsia-100 text-fuchsia-700 font-bold">✕</button>
  </div>
  <div id="cheat-body" class="px-5 py-4 space-y-5"></div>
</div>

<script>
/* ============================================================
   STATE — emulates the Go service in localStorage
============================================================ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "securityEnabled": true,
  "showMascot": true
}/*EDITMODE-END*/;

const STATE_KEY = "bailab.state.v1";
const defaultState = () => ({
  securityEnabled: TWEAK_DEFAULTS.securityEnabled,
  session: null, // {username, role, id}
  flash: null,   // {message, isError}
  users: [
    {id:1, username:"admin",  password:"admin",   email:"admin@example.com", role:"admin",
     passwordHash:"$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy"},
    {id:2, username:"alice",  password:"hunter2", email:"alice@example.com", role:"user",
     passwordHash:"$2a$10$kI...alice..."},
    {id:3, username:"bob",    password:"qwerty",  email:"bob@example.com",   role:"user",
     passwordHash:"$2a$10$kI...bob..."},
  ],
  posts: [
    {id:1, title:"Welcome to BAI Lab", post_content:"This server-rendered demo contrasts an insecure and a secure version of the same app. Toggle the Security switch to flip behaviour.", published:1, author_id:1, created_at:"2026-04-12"},
    {id:2, title:"SQL Injection 101", post_content:"In Vulnerable mode the search endpoint concatenates user input directly into a SELECT. Try the payload: ' OR 1=1 --", published:1, author_id:1, created_at:"2026-04-15"},
    {id:3, title:"Stored XSS demo", post_content:"Comments are rendered unescaped in Vulnerable mode. The classic <scr"+"ipt>alert(1)</scr"+"ipt> works.", published:1, author_id:2, created_at:"2026-04-20"},
    {id:4, title:"Draft: Path Traversal notes", post_content:"Internal notes about ../../../etc/passwd attempts on /api/files?name=...", published:0, author_id:2, created_at:"2026-04-22"},
    {id:5, title:"On rounded cyber-cute UI", post_content:"M PLUS Rounded 1c + sakura gradients give the lab a friendly aesthetic without hiding the danger.", published:1, author_id:3, created_at:"2026-04-25"},
  ],
  comments: [
    {id:1, post_id:3, author:"alice",  body:"Nice writeup!"},
    {id:2, post_id:3, author:"bob",    body:"<em>cool emphasis</em>"},
  ],
  nextPostId: 6,
  nextUserId: 4,
  nextCommentId: 3,
});

let S = load();
function load(){
  try{ const raw = localStorage.getItem(STATE_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  return defaultState();
}
function save(){ localStorage.setItem(STATE_KEY, JSON.stringify(S)); }
function resetState(){ localStorage.removeItem(STATE_KEY); S = defaultState(); save(); render(); }

/* ============================================================
   ROUTER
============================================================ */
const routes = {
  "/posts": pagePosts,
  "/login": pageLogin,
  "/register": pageRegister,
  "/posts/new": pagePostNew,
  "/admin": pageAdmin,
  "/vuln": pageVulnIndex,
  "/vuln/sqli": pageVulnSqli,
  "/vuln/xss": pageVulnXss,
  "/vuln/idor": pageVulnIdor,
  "/vuln/csrf": pageVulnCsrf,
  "/vuln/cmd": pageVulnCmd,
  "/vuln/exposure": pageVulnExposure,
  "/about": pageAbout,
};

function parseHash(){
  const h = location.hash.replace(/^#/, "") || "/posts";
  const [path, queryStr] = h.split("?");
  const query = Object.fromEntries(new URLSearchParams(queryStr || ""));
  // Match dynamic: /posts/edit/:id, /posts/view/:id
  if (/^\/posts\/edit\/(\d+)$/.test(path))   return {fn: pagePostEdit, params:{id: +RegExp.$1}, query};
  if (/^\/posts\/view\/(\d+)$/.test(path))   return {fn: pagePostView, params:{id: +RegExp.$1}, query};
  return {fn: routes[path] || pagePosts, params:{}, query};
}

window.addEventListener("hashchange", render);

/* ============================================================
   COMMON UI
============================================================ */
function badge(){
  return S.securityEnabled
    ? `<span class="inline-flex items-center gap-1 rounded-full border border-cyan-200 bg-gradient-to-r from-emerald-400 to-cyan-400 px-3 py-1 text-xs font-bold text-white shadow-sm shadow-cyan-200">🛡️ Secure</span>`
    : `<span class="inline-flex items-center gap-1 rounded-full border border-rose-200 bg-gradient-to-r from-rose-400 to-orange-400 px-3 py-1 text-xs font-bold text-white shadow-sm shadow-rose-200">⚠️ Vulnerable</span>`;
}
function navLink(href,label,icon){
  return `<a href="${href}" class="inline-flex items-center gap-2 rounded-full border border-fuchsia-200 bg-white/80 px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm transition hover:-translate-y-0.5 hover:border-pink-300 hover:bg-fuchsia-50 hover:text-fuchsia-700">${icon?`<span>${icon}</span>`:""}<span>${label}</span></a>`;
}
function navLinkActive(href,label,icon){
  return `<a href="${href}" class="inline-flex items-center gap-2 rounded-full border border-fuchsia-300 bg-fuchsia-50 px-4 py-2 text-sm font-semibold text-fuchsia-700 shadow-sm">${icon?`<span>${icon}</span>`:""}<span>${label}</span></a>`;
}
function renderHeader(){
  const path = location.hash.replace(/^#/,"") || "/posts";
  const isActive = p => path === p || path.startsWith(p+"/");
  const link = (p,l,i)=> isActive(p) ? navLinkActive("#"+p,l,i) : navLink("#"+p,l,i);

  let html = "";
  html += link("/posts","Posts","📝");
  html += link("/vuln","Vuln Demos","🧪");
  if(S.session && S.session.role === "admin") html += link("/admin","Admin","🛠️");
  if(!S.session){
    html += link("/login","Login","🔑");
    html += link("/register","Register","✍️");
  } else {
    html += `<span class="inline-flex items-center gap-2 rounded-full bg-fuchsia-100 px-3 py-2 text-sm font-semibold text-fuchsia-800">👤 ${escapeHtml(S.session.username)}</span>`;
    html += `<button onclick="logout()" class="inline-flex items-center gap-2 rounded-full border border-fuchsia-200 bg-white/80 px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm transition hover:-translate-y-0.5 hover:border-pink-300 hover:bg-fuchsia-50 hover:text-fuchsia-700">🚪 Logout</button>`;
  }
  html += badge();
  document.getElementById("navlinks").innerHTML = html;
}

function escapeHtml(s){return String(s ?? "").replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}

function flashHTML(){
  if(!S.flash) return "";
  const {message, isError} = S.flash;
  S.flash = null; save();
  return resultMessage(message, isError);
}
function resultMessage(message, isError){
  if(!message) return "";
  return isError
    ? `<div class="flex items-center gap-3 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-800" role="alert"><span class="text-lg">⚠️</span><span>${escapeHtml(message)}</span></div>`
    : `<div class="flex items-center gap-3 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-800" role="status"><span class="text-lg">✓</span><span>${escapeHtml(message)}</span></div>`;
}

function setFlash(message, isError){ S.flash = {message, isError}; save(); }

function panel(inner, extra=""){
  return `<div class="rounded-2xl border border-fuchsia-100 bg-white/90 p-6 shadow-[0_12px_40px_rgba(236,72,153,0.12)] backdrop-blur ${extra}">${inner}</div>`;
}
function pageWrap(html){
  return `<div class="page-enter">${html}</div>`;
}
function pageHeader(title, sub, icon){
  return `
    <div class="mb-8">
      <h1 class="text-4xl font-bold text-slate-900">${icon?icon+" ":""}${escapeHtml(title)}</h1>
      ${sub?`<p class="text-slate-600 mt-2">${escapeHtml(sub)}</p>`:""}
    </div>`;
}

function inputField({label,name,type="text",value="",placeholder="",required=false,rows=null,min,max,extra=""}){
  const common = `class="w-full rounded-xl border border-fuchsia-200 bg-white px-3 py-2 text-slate-900 outline-none ring-2 ring-transparent focus:border-pink-400 focus:ring-pink-100 transition" name="${name}" id="${name}" placeholder="${escapeHtml(placeholder)}" ${required?"required":""} ${min?`minlength="${min}"`:""} ${max?`maxlength="${max}"`:""} ${extra}`;
  const ctrl = rows
    ? `<textarea ${common} rows="${rows}">${escapeHtml(value)}</textarea>`
    : `<input ${common} type="${type}" value="${escapeHtml(value)}">`;
  return `
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2" for="${name}">${escapeHtml(label)}</label>
      ${ctrl}
    </div>`;
}
function primaryBtn(label, type="submit"){
  return `<button class="inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-full bg-gradient-to-r from-fuchsia-500 via-pink-500 to-sky-500 text-white font-semibold shadow-lg shadow-pink-200 transition hover:-translate-y-0.5 hover:shadow-pink-300 active:translate-y-0" type="${type}">${label}</button>`;
}
function ghostBtn(label, href){
  return `<a class="inline-flex items-center gap-2 px-4 py-2.5 rounded-full border border-fuchsia-200 bg-white/80 text-slate-700 font-semibold hover:bg-fuchsia-50 hover:text-fuchsia-700 transition" href="${href}">${escapeHtml(label)}</a>`;
}

/* ============================================================
   PAGES
============================================================ */
function pagePosts(){
  const loggedIn = !!S.session;
  const sec = S.securityEnabled;
  const flash = flashHTML();

  let banner = "";
  if(sec){
    banner = loggedIn

function visiblePosts(){
  // In secure mode, only published posts visible to non-authors
  const sec = S.securityEnabled;
  return S.posts.filter(p => {
    if(p.published === 1) return true;
    if(!sec) return true; // vulnerable: shows drafts to everyone
    if(S.session && (S.session.role === "admin" || S.session.id === p.author_id)) return true;
    return false;
  });
}

function postsList(posts, canEdit){
  if(posts.length === 0){
    return `<div class="py-12 text-center"><p class="text-2xl mb-2">📭</p><p class="text-lg font-semibold text-slate-700">No posts yet</p><p class="text-sm text-slate-500 mt-1">Create your first post to get started</p></div>`;

  return `<div id="posts-list" class="grid gap-4 sm:gap-6">${posts.map(p=>postCard(p,canEdit)).join("")}</div>`;
}
function postCard(p, canEdit){

  const contentHtml = sec ? escapeHtml(p.post_content) : p.post_content;
  return `

        </div>
        ${p.published===1
          ? `<span class="inline-flex items-center gap-1 px-2 py-1 rounded-full text-xs font-semibold bg-gradient-to-r from-emerald-100 to-cyan-100 text-emerald-700 whitespace-nowrap">✓ Published</span>`

function submitCreatePost(e){
  e.preventDefault();
  const fd = new FormData(e.target);
  const title = (fd.get("title")||"").toString().trim();
  const content = (fd.get("post_content")||"").toString();
  const published = fd.get("published") ? 1 : 0;
  if(S.securityEnabled && !S.session){ setFlash("Please log in to create posts.", true); render(); return false;}
  if(!title){ setFlash("Title is required.", true); render(); return false; }
  S.posts.unshift({id:S.nextPostId++, title, post_content: content, published, author_id: S.session ? S.session.id : 1, created_at: new Date().toISOString().slice(0,10)});
  setFlash("Post created successfully.", false);
  save(); render(); return false;
}

function deletePost(id){
  if(!confirm("Delete this post?")) return;
  const sec = S.securityEnabled;
  const p = S.posts.find(x=>x.id===id);
  if(!p){ setFlash("Post not found.", true); render(); return; }
  if(sec && (!S.session || (S.session.role!=="admin" && S.session.id!==p.author_id))){
    setFlash("You don't have permission to delete this post.", true); render(); return;
  }
  S.posts = S.posts.filter(x=>x.id!==id);
  setFlash("Post deleted.", false);
  save(); render();
}

function submitLogin(e){
  e.preventDefault();
  const fd = new FormData(e.target);
  const u = (fd.get("username")||"").toString();
  const p = (fd.get("password")||"").toString();
  // Vulnerable mode simulates SQLi-style auth bypass: ' OR '1'='1
  if(!S.securityEnabled){
    if(/'\s*OR\s*'1'\s*=\s*'1/i.test(u) || /'\s*OR\s*'1'\s*=\s*'1/i.test(p)){
      const admin = S.users.find(x=>x.role==="admin");
      S.session = {username:admin.username, role:admin.role, id:admin.id};
      setFlash("⚠️ SQLi bypass succeeded! Logged in as admin (vulnerable mode).", false);
      save(); location.hash="#/posts"; return false;
    }
  }
  const user = S.users.find(x => x.username===u && x.password===p);
  if(!user){ setFlash("Invalid username or password.", true); render(); return false; }
  S.session = {username:user.username, role:user.role, id:user.id};
  setFlash(`Welcome back, ${user.username}!`, false);
  save(); location.hash="#/posts"; return false;
}

/* ----- 1. SQL Injection ----- */
function pageVulnSqli(){
  return pageWrap(`
    <div class="space-y-6">
      ${vulnHeader("SQL Injection","Search posts by title — vulnerable mode concatenates user input into SQL.","💉")}
      ${panel(`
        <h3 class="text-base font-bold mb-2">Try a payload</h3>
        <p class="text-sm text-slate-600 mb-4">Suggested payloads: <code class="bg-fuchsia-50 px-2 py-0.5 rounded text-fuchsia-700">' OR 1=1 --</code> &nbsp; <code class="bg-fuchsia-50 px-2 py-0.5 rounded text-fuchsia-700">' UNION SELECT 1,username,password,1,1 FROM users --</code></p>
        <form onsubmit="return runSqli(event)" class="flex gap-2">
          <input id="sqli-input" name="q" class="flex-1 rounded-xl border border-fuchsia-200 bg-white px-3 py-2 outline-none focus:border-pink-400 focus:ring-2 focus:ring-pink-100 font-mono text-sm" placeholder="Search post title..." value="' OR 1=1 --">
          ${primaryBtn("🔎 Search","submit")}
        </form>
        <div id="sqli-out" class="mt-4"></div>
      `)}
      ${codeCompare({
        title:"Code review",
        bad:`q := c.Query("q")
sql := "SELECT id,title FROM posts WHERE title LIKE '%" + q + "%'"
rows, _ := db.Query(sql) // ⚠️ string concat`,
        good:`q := c.Query("q")
rows, err := db.Query(
  "SELECT id, title FROM posts WHERE title LIKE ?",
  "%"+q+"%", // ✓ parameterized
)`
      })}
    </div>
  `);
}
function runSqli(e){
  e.preventDefault();
  const q = document.getElementById("sqli-input").value;
  const out = document.getElementById("sqli-out");
  if(S.securityEnabled){
    const matches = S.posts.filter(p => p.title.toLowerCase().includes(q.toLowerCase()));
    out.innerHTML = `
      <div class="rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800 mb-3">🛡️ Secure: query parameterized. Returned only literal title matches.</div>
      ${matches.length===0?`<p class="text-sm text-slate-500">No results.</p>`:`<ul class="space-y-1 text-sm">${matches.map(p=>`<li class="font-mono">#${p.id} — ${escapeHtml(p.title)}</li>`).join("")}</ul>`}`;
    return false;
  }
  // Vulnerable: ' OR 1=1 -- returns ALL posts; UNION SELECT leaks users
  let injected = false;
  let unionLeak = false;
  if(/'\s*OR\s*1\s*=\s*1/i.test(q)) injected = true;
  if(/UNION\s+SELECT/i.test(q) && /users/i.test(q)) unionLeak = true;

  let html = `<div class="terminal mb-3"><span class="dim">$ sqlite&gt; </span><span class="warn">SELECT id,title FROM posts WHERE title LIKE '%${escapeHtml(q)}%'</span>\n`;
  let rows = S.posts.filter(p => p.title.toLowerCase().includes(q.toLowerCase()));
  if(injected) rows = S.posts.slice();
  rows.forEach(p => html += `<span class="ok">${String(p.id).padStart(2)}</span>  ${escapeHtml(p.title)}\n`);
  if(unionLeak){
    html += `<span class="err">-- UNION leaked rows from users --</span>\n`;
    S.users.forEach(u => html += `<span class="err">${u.id}  ${u.username}  ${u.password}</span>\n`);
  }
  html += `</div>`;
  if(injected || unionLeak) html = `<div class="rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-800 mb-3">⚠️ SQL Injection succeeded. ${unionLeak?"User credentials leaked via UNION.":"Filter bypassed — full table returned."}</div>` + html;
  out.innerHTML = html;
  return false;
}

function runCsrf(e){
  e.preventDefault();
  const out = document.getElementById("csrf-out");
  if(!S.session){
    out.innerHTML = resultMessage("Nothing happens — user is not logged in to BAI Lab.", false);
    return false;
  }
  if(S.securityEnabled){
    out.innerHTML = `<div class="rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800">🛡️ Secure: request rejected — missing CSRF token + SameSite cookie blocks the cross-origin POST.</div>`;
    return false;
  }
  const u = S.users.find(x => x.id === S.session.id);
  if(u){ u.password = "pwn3d-by-evil"; save(); }
  out.innerHTML = `<div class="rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-800">⚠️ Password for <strong>@${escapeHtml(u.username)}</strong> silently changed to <code class="font-mono bg-white px-1 rounded">pwn3d-by-evil</code>. Try logging in again — original password no longer works.</div>`;

}

function pageVulnCmd(){
  return pageWrap(`
    <div class="space-y-6">
      ${vulnHeader("Command Injection","A 'ping host' admin tool runs sh -c with user input.","💻")}
      ${panel(`
        <h3 class="text-base font-bold mb-2">Try it</h3>
        <p class="text-sm text-slate-600 mb-3">Suggested payload: <code class="bg-fuchsia-50 px-2 py-0.5 rounded text-fuchsia-700">8.8.8.8 ; cat /etc/passwd</code></p>
        <form onsubmit="return runCmd(event)" class="flex gap-2">
          <input id="cmd-input" class="flex-1 rounded-xl border border-fuchsia-200 bg-white px-3 py-2 outline-none focus:border-pink-400 focus:ring-2 focus:ring-pink-100 font-mono text-sm" value="8.8.8.8 ; cat /etc/passwd">
          ${primaryBtn("📡 Ping","submit")}
        </form>
        <div id="cmd-out" class="mt-4"></div>
      `)}
      ${codeCompare({
        title:"Code review",
        bad:`host := c.Query("host")
out, _ := exec.Command("sh","-c","ping -c1 "+host).Output()
// ⚠️ shell metacharacters not escaped`,
        good:`host := c.Query("host")
if !validHostRegex.MatchString(host) {
    c.AbortWithStatus(400); return
}
out, _ := exec.Command("ping", "-c1", host).Output()
// ✓ no shell, strict input validation`
      })}
    </div>`);
}
function runCmd(e){
  e.preventDefault();
  const v = document.getElementById("cmd-input").value;
  const out = document.getElementById("cmd-out");
  if(S.securityEnabled){
    if(!/^[a-zA-Z0-9.\-]+$/.test(v.trim())){
      out.innerHTML = `<div class="rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800">🛡️ Secure: rejected — host contains invalid characters.</div>`;
      return false;
    }
    out.innerHTML = `<div class="terminal"><span class="dim">$ </span><span class="info">ping -c1 ${escapeHtml(v)}</span>\n<span class="ok">PING ${escapeHtml(v)}: 56 data bytes\n64 bytes from ${escapeHtml(v)}: icmp_seq=0 ttl=58 time=12.4 ms</span></div>`;
    return false;
  }
  // Vulnerable: simulate ; cat /etc/passwd
  let html = `<div class="terminal"><span class="dim">$ </span><span class="warn">sh -c "ping -c1 ${escapeHtml(v)}"</span>\n`;
  html += `<span class="ok">PING ${escapeHtml(v.split(";")[0].trim())}: 56 data bytes\n64 bytes from ...: icmp_seq=0 ttl=58 time=12.4 ms</span>\n`;
  if(/;\s*cat\s+\/etc\/passwd/.test(v)){
    html += `<span class="err">root:x:0:0:root:/root:/bin/bash\nbai:x:1000:1000:BAI Lab,,,:/home/bai:/bin/bash\nsqlite:x:1001:1001::/home/sqlite:/usr/sbin/nologin</span>\n`;
  } else if(/;\s*whoami/.test(v)){
    html += `<span class="err">www-data</span>\n`;
  } else if(/;/.test(v)){
    html += `<span class="warn">[command after ; would also run on a real shell]</span>\n`;
  }
  html += `</div>`;
  out.innerHTML = `<div class="rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-800 mb-3">⚠️ Command Injection: shell metacharacters (<code>;</code>) split the command — second command runs with the server's privileges.</div>`+html;
  return false;
}

function renderExposure(){
  if(S.securityEnabled){
    const safe = S.users.map(u=>({id:u.id,username:u.username,email:u.email,role:u.role}));
    return `<div class="rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800 mb-3">🛡️ Secure: password column omitted, only public fields returned.</div>
      <pre class="terminal"><span class="ok">${escapeHtml(JSON.stringify(safe,null,2))}</span></pre>`;
  }
  return `<div class="rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-800 mb-3">⚠️ Vulnerable: full row returned, including plaintext passwords.</div>
    <pre class="terminal"><span class="err">${escapeHtml(JSON.stringify(S.users.map(u=>({id:u.id,username:u.username,email:u.email,password:u.password,role:u.role})),null,2))}</span></pre>`;
}

      <button onclick="closeTweaks()" class="h-7 w-7 rounded-full bg-fuchsia-50 hover:bg-fuchsia-100 text-fuchsia-700 text-xs font-bold">✕</button>
    </div>
    <div class="space-y-3">

          <button onclick="setSec(true)"  class="flex-1 px-2 py-1.5 rounded-full text-xs font-bold ${sec?'bg-gradient-to-r from-emerald-400 to-cyan-400 text-white shadow':'text-slate-600'}">🛡️ Secure</button>

          <span class="text-sm font-semibold">Show mascot</span>
          <input type="checkbox" id="tw-mascot" ${TWEAK_DEFAULTS.showMascot?"checked":""} onchange="toggleMascot(this.checked)" class="h-4 w-4">
        </label>
      </div>
      <div class="pt-2 border-t border-fuchsia-100 grid grid-cols-2 gap-2">
        <button onclick="quickLogin('admin')" class="rounded-lg bg-fuchsia-50 hover:bg-fuchsia-100 text-fuchsia-700 text-xs font-bold py-2">Quick: admin</button>
        <button onclick="quickLogin('alice')" class="rounded-lg bg-fuchsia-50 hover:bg-fuchsia-100 text-fuchsia-700 text-xs font-bold py-2">Quick: alice</button>

      <button onclick="resetState()" class="w-full rounded-lg bg-rose-50 hover:bg-rose-100 text-rose-700 text-xs font-bold py-2">↻ Reset demo data</button>
    </div>`;

function quickLogin(name){
  const u = S.users.find(x=>x.username===name);
  if(u){ S.session={username:u.username,role:u.role,id:u.id}; setFlash(`Logged in as @${u.username}`,false); save(); render(); }
}
function setSec(v){
  S.securityEnabled = v;
  TWEAK_DEFAULTS.securityEnabled = v;
  save(); render();
  if(window.parent !== window){
    try{ window.parent.postMessage({type:'__edit_mode_set_keys', edits:{securityEnabled:v}}, '*'); }catch(e){}
  }
}
function toggleMascot(v){
  document.getElementById("anime-mascot").style.display = v ? "" : "none";
  TWEAK_DEFAULTS.showMascot = v;
  if(window.parent !== window){
    try{ window.parent.postMessage({type:'__edit_mode_set_keys', edits:{showMascot:v}}, '*'); }catch(e){}
  }
}
function openTweaks(){ tweaksOpen=true; const el=document.getElementById("tweaks-panel"); if(el) el.style.display="block"; else buildTweaks(); }
function closeTweaks(){ tweaksOpen=false; const el=document.getElementById("tweaks-panel"); if(el) el.style.display="none"; if(window.parent!==window){try{ window.parent.postMessage({type:'__edit_mode_dismissed'},'*'); }catch(e){}} }

window.addEventListener("message",(e)=>{
  if(!e.data || !e.data.type) return;
  if(e.data.type==="__activate_edit_mode") openTweaks();
  if(e.data.type==="__deactivate_edit_mode") closeTweaks();
});
window.addEventListener("load",()=>{
  if(window.parent!==window){
    try{ window.parent.postMessage({type:'__edit_mode_available'},'*'); }catch(e){}

/* ============================================================
   REQUEST INSPECTOR + ATTACK TIMELINE
============================================================ */
const REQ_LOG = [];
const ATK_LOG = [];
function logRequest({method, path, headers={}, body=null, status=200, blocked=false, note=""}){
  const t = new Date();
  const elapsed = (12 + Math.random()*180)|0;
  const entry = {id: Date.now()+Math.random(), t, method, path, headers, body, status, blocked, note, elapsed};
  REQ_LOG.unshift(entry);
  if(REQ_LOG.length>60) REQ_LOG.pop();
  renderReqs();
  return entry;
}
function logAttack({vuln, payload, success, note=""}){
  const t = new Date();
  ATK_LOG.unshift({id:Date.now()+Math.random(), t, vuln, payload, success, note, mode:S.securityEnabled?"secure":"vulnerable", who:S.session?S.session.username:"anon"});
  if(ATK_LOG.length>50) ATK_LOG.pop();
  renderAtks();
  if(success) achievement(`💥 ${vuln} pwned!`);
  else if(S.securityEnabled) achievement(`🛡️ ${vuln} blocked`);
}
function fmtTime(d){return d.toTimeString().slice(0,8)+"."+String(d.getMilliseconds()).padStart(3,"0")}
function renderReqs(){
  document.getElementById("reqs-count").textContent = REQ_LOG.length;
  const list = document.getElementById("reqs-list");
  if(!list) return;
  list.innerHTML = REQ_LOG.slice(0,15).map(r=>{
    const pillClass = r.blocked?"pill-403":r.note==="pwn"?"pill-pwn":r.status>=400?"pill-403":"pill-200";
    return `<div class="hud-row method-${r.method}" onclick="showReq(${r.id})">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="pill" style="background:#f3f4f6;color:#111">${r.method}</span>
        <span style="flex:1;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(r.path)}</span>
        <span class="pill ${pillClass}">${r.blocked?"BLOCK":r.status}</span>
      </div>
      <div style="color:#9ca3af;font-size:10px;margin-top:2px">${fmtTime(r.t)} • ${r.elapsed}ms</div>
    </div>`;
  }).join("") || `<div style="color:#9ca3af;text-align:center;padding:18px;font-size:11px">No requests yet — interact with the app.</div>`;
}
function showReq(id){
  const r = REQ_LOG.find(x=>x.id===id); if(!r) return;
  const detail = document.getElementById("reqs-detail");
  const headerLines = Object.entries(r.headers).map(([k,v])=>`${k}: ${v}`).join("\n");
  detail.style.display = "block";
  detail.innerHTML = `<span class="info">${r.method} ${escapeHtml(r.path)} HTTP/1.1</span>
<span class="dim">${escapeHtml(headerLines)}</span>
${r.body?`\n${escapeHtml(typeof r.body==="string"?r.body:JSON.stringify(r.body,null,2))}`:""}

<span class="${r.blocked?'err':'ok'}">← HTTP/1.1 ${r.blocked?"403 Forbidden":r.status+" OK"}</span>
<span class="dim">x-elapsed: ${r.elapsed}ms${r.note?"\nx-bai-note: "+r.note:""}</span>`;
}
function renderAtks(){
  document.getElementById("atk-count").textContent = ATK_LOG.length;
  const list = document.getElementById("atk-list");
  if(!list) return;
  list.innerHTML = ATK_LOG.slice(0,20).map(a=>{
    const cls = a.success ? "pill-pwn" : "pill-blocked";
    const lbl = a.success ? "PWND" : "BLOCKED";
    return `<div class="hud-row" style="border-left:3px solid ${a.success?'#f59e0b':'#3b82f6'}">
      <div style="display:flex;gap:6px;align-items:center;margin-bottom:3px">
        <span class="pill" style="background:#fce7f3;color:#831843">${a.vuln}</span>
        <span class="pill ${cls}">${lbl}</span>
        <span style="margin-left:auto;color:#9ca3af;font-size:10px">${fmtTime(a.t)}</span>
      </div>
      <div style="color:#374151;word-break:break-all">${escapeHtml(a.payload).slice(0,160)}</div>
      <div style="color:#9ca3af;font-size:10px;margin-top:2px">@${escapeHtml(a.who)} • ${a.mode}${a.note?" • "+escapeHtml(a.note):""}</div>
    </div>`;
  }).join("") || `<div style="color:#9ca3af;text-align:center;padding:18px;font-size:11px">No attacks attempted yet.</div>`;
}
function toggleHud(id){
  const body = document.getElementById(id==="hud-requests"?"reqs-body":"atk-body");
  body.style.display = body.style.display==="none" ? "block" : "none";
}
function exportPoC(){
  const lines = ["# BAI Lab — PoC report","","Generated: "+new Date().toISOString(),"",`## Attacks (${ATK_LOG.length})`,""];
  ATK_LOG.slice().reverse().forEach((a,i)=>{
    lines.push(`### ${i+1}. ${a.vuln} — ${a.success?"✅ succeeded":"🛡 blocked"}`);
    lines.push(`- mode: \`${a.mode}\`  user: \`${a.who}\`  time: ${a.t.toISOString()}`);
    lines.push("- payload:");
    lines.push("```");
    lines.push(a.payload);
    lines.push("```");
    if(a.note) lines.push(`- note: ${a.note}`);
    lines.push("");
  });
  const blob = new Blob([lines.join("\n")], {type:"text/markdown"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "bai-lab-poc.md"; a.click();
}

          <div class="text-[10px] font-bold uppercase tracking-wider text-fuchsia-700 mb-1">${escapeHtml(label)}</div>

      return `<details class="rounded-xl border border-fuchsia-100 bg-fuchsia-50/40 overflow-hidden mb-2" ${f?"open":""}>

          ${c.what?`<div class="text-xs text-slate-700 leading-relaxed"><strong class="text-fuchsia-700">Co to:</strong> ${escapeHtml(c.what)}</div>`:""}
          ${c.detect?`<div class="text-xs text-slate-700 leading-relaxed"><strong class="text-amber-700">Jak wykryć:</strong> ${escapeHtml(c.detect)}</div>`:""}

          <div class="pt-2 border-t border-fuchsia-100">${payloadsHtml}</div>
        </div>
      </details>`;

        </div>
        <div class="skeleton h-6 w-20 rounded-full"></div>

      </div>
      <div class="pt-4 border-t border-fuchsia-100">
        <div class="skeleton h-4 w-24"></div>
      </div>
    </article>`;
  }
  return h+"</div>";
}

const _origSubmitLogin = submitLogin;
submitLogin = function(e){
  const fd = new FormData(e.target);
  const u = (fd.get("username")||"").toString();
  const p = (fd.get("password")||"").toString();
  const sqliAttempt = /'\s*OR\s*'1'\s*=\s*'1|'\s*OR\s*1\s*=\s*1|'--/i.test(u+p);
  logRequest({method:"POST", path:"/ui/login", headers:{"Content-Type":"application/x-www-form-urlencoded","Cookie":S.session?`session=${S.session.username}`:""}, body:`username=${u}&password=${"*".repeat(p.length)}`, status:sqliAttempt && !S.securityEnabled?200:S.securityEnabled?(S.users.find(x=>x.username===u&&x.password===p)?200:401):200, note:sqliAttempt && !S.securityEnabled?"pwn":""});
  if(sqliAttempt) logAttack({vuln:"SQLi (login)", payload:`u=${u} / p=${p}`, success:!S.securityEnabled, note:S.securityEnabled?"prepared statement":"auth bypass"});
  return _origSubmitLogin(e);
};
const _origRunSqli = runSqli;
runSqli = function(e){
  const q = document.getElementById("sqli-input").value;
  logRequest({method:"GET", path:"/api/search-vulnerable?q="+encodeURIComponent(q), headers:{Accept:"application/json"}, status:200, note: !S.securityEnabled && /UNION|OR\s*1=1/i.test(q) ? "pwn":""});
  logAttack({vuln:"SQLi", payload:q, success: !S.securityEnabled && /UNION|OR\s*1=1|--/i.test(q), note: S.securityEnabled?"parameterized":"concat"});
  return _origRunSqli(e);
};
const _origRunCmd = runCmd;
runCmd = function(e){
  const v = document.getElementById("cmd-input").value;
  const inj = /[;&|`$]/.test(v);
  logRequest({method:"POST", path:"/api/admin/ping", headers:{"Content-Type":"application/json"}, body:JSON.stringify({host:v}), status:S.securityEnabled&&inj?400:200, blocked:S.securityEnabled&&inj, note:!S.securityEnabled&&inj?"pwn":""});
  logAttack({vuln:"CmdInjection", payload:v, success:!S.securityEnabled&&inj, note:S.securityEnabled?"regex validated":"sh -c"});
  return _origRunCmd(e);
};
const _origRunCsrf = runCsrf;
runCsrf = function(e){
  logRequest({method:"POST", path:"/users/me/password", headers:{"Origin":"https://evil.example.com","Cookie":S.session?`session=${S.session.username}`:"(none)"}, body:"new_password=pwn3d-by-evil", status:S.securityEnabled?403:200, blocked:S.securityEnabled, note:!S.securityEnabled&&S.session?"pwn":""});
  logAttack({vuln:"CSRF", payload:"POST /users/me/password from evil.example.com", success: !S.securityEnabled && !!S.session, note:S.securityEnabled?"token + SameSite":"no token"});
  return _origRunCsrf(e);
};
const _origSubmitComment = submitComment;
submitComment = function(e, postId){
  const body = (new FormData(e.target).get("body")||"").toString();
  const xss = /<scr|onerror|onload|<svg|<img\s|javascript:/i.test(body);
  logRequest({method:"POST", path:`/posts/${postId}/comments`, headers:{"Content-Type":"application/x-www-form-urlencoded"}, body:`body=${body.slice(0,80)}`, status:200, note:!S.securityEnabled&&xss?"pwn":""});
  if(xss) logAttack({vuln:"XSS (stored)", payload:body, success:!S.securityEnabled, note:S.securityEnabled?"escaped":"raw render"});
  return _origSubmitComment(e, postId);
};
const _origDeletePost = deletePost;
deletePost = function(id){
  const p = S.posts.find(x=>x.id===id);
  if(p){
    const idor = S.session && p.author_id !== S.session.id && S.session.role !== "admin";
    logRequest({method:"DELETE", path:`/posts/${id}`, headers:{"Cookie":S.session?`session=${S.session.username}`:""}, status:S.securityEnabled&&idor?403:200, blocked:S.securityEnabled&&idor, note:!S.securityEnabled&&idor?"pwn":""});
    if(idor) logAttack({vuln:"IDOR (delete)", payload:`DELETE /posts/${id} (author=${p.author_id}, you=${S.session.id})`, success:!S.securityEnabled, note:S.securityEnabled?"ownership check":"no check"});
  }
  return _origDeletePost(id);
};

/* ============================================================
   MASCOT (flees from cursor)
============================================================ */
(() => {
  const mascot = document.getElementById('anime-mascot');
  if(!mascot || matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  let pointerX = innerWidth*0.75, pointerY = innerHeight*0.35;
  let currentX = innerWidth-86, currentY = 112;
  let velocityX = 0, velocityY = 0;
  let wanderAngle = Math.random()*Math.PI*2;
  let wanderTargetX = currentX, wanderTargetY = currentY;
  const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
  const rand=(a,b)=>a+Math.random()*(b-a);
  const updateWander=()=>{
    wanderAngle += rand(-0.9,0.9);
    const d = rand(30,130);
    wanderTargetX = clamp(currentX+Math.cos(wanderAngle)*d, 16, innerWidth-70);
    wanderTargetY = clamp(currentY+Math.sin(wanderAngle)*d, 80, innerHeight-70);
  };
  setInterval(updateWander, 1200);
  addEventListener('pointermove', e=>{ pointerX=e.clientX; pointerY=e.clientY; });
  addEventListener('resize', ()=>{ currentX=clamp(currentX,16,innerWidth-70); currentY=clamp(currentY,80,innerHeight-70); });
  function tick(){
    const cx = currentX+28, cy = currentY+28;
    const dx = cx-pointerX, dy = cy-pointerY;
    const dist = Math.hypot(dx,dy);
    let ax=0, ay=0;
    if(dist < 220){
      const f = (220-dist)/220 * 0.9;
      ax += (dx/(dist||1))*f; ay += (dy/(dist||1))*f;
    }
    ax += (wanderTargetX-currentX)*0.0025;
    ay += (wanderTargetY-currentY)*0.0025;
    velocityX = (velocityX+ax)*0.92;
    velocityY = (velocityY+ay)*0.92;
    currentX = clamp(currentX+velocityX, 16, innerWidth-70);
    currentY = clamp(currentY+velocityY, 80, innerHeight-70);
    mascot.style.left = currentX+"px";
    mascot.style.top  = currentY+"px";
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
